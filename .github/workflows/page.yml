name: "Deploy to GitHub Pages"

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Hugo
        run: |
          curl -sL https://api.github.com/repos/gohugoio/hugo/releases/latest \
            | jq -r '.assets[] | select(.name | startswith("hugo_extended_") and endswith("_linux-amd64.deb")) | .browser_download_url' \
            | xargs wget -q -O "${{ runner.temp }}/hugo.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
          hugo version
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Build with Hugo
        run: |
          hugo build -Ee production \
            --gc --logLevel info --minify --enableGitInfo \
            -b ${{ steps.pages.outputs.base_url }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
